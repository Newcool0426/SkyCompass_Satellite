name: Build Firmware

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          pip install platformio

      - name: Build firmware
        run: |
          pio run

      - name: Get current date
        id: date
        run: |
          echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV
          echo "DATETIME=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_ENV

      - name: Merge firmware binaries
        run: |
          # 安装esptool
          pip install esptool

          # 获取PlatformIO包路径
          PLATFORMIO_PACKAGES="$HOME/.platformio/packages"
          FRAMEWORK_DIR=$(find $PLATFORMIO_PACKAGES -name "framework-arduinoespressif32" -type d | head -1)

          # 创建合并后的bin文件名：项目名_日期.bin
          OUTPUT_NAME="SkyCompass_${{ env.DATE }}.bin"

          # 合并bin文件
          esptool.py --chip esp32s3 merge_bin \
            -o $OUTPUT_NAME \
            --flash_mode dio \
            --flash_size 8MB \
            0x0000 .pio/build/m5stack-cardputer/bootloader.bin \
            0x8000 .pio/build/m5stack-cardputer/partitions.bin \
            0xe000 $FRAMEWORK_DIR/tools/partitions/boot_app0.bin \
            0x10000 .pio/build/m5stack-cardputer/firmware.bin

          echo "Created: $OUTPUT_NAME"
          ls -la $OUTPUT_NAME

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: SkyCompass_${{ env.DATETIME }}
          path: SkyCompass_${{ env.DATE }}.bin
          retention-days: 30

      - name: Upload firmware to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: SkyCompass_${{ env.DATE }}.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
